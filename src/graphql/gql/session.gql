fragment ActiveSessionFields on ActiveSession {
  _id
  kratos_identity_id
  kratos_session_id
  device_name
  device_model
  os
  app_version
  client_type
  ip_address
  last_active: last_active_at
  is_current
  has_active_websocket
}

query GetMyActiveSessions {
  getMyActiveSessions {
    ...ActiveSessionFields
  }
}

mutation RevokeMySession($session_id: String!) {
  revokeMySession(sessionId: $session_id)
}

mutation RequestStepUpVerification {
  requestStepUpVerification
}

mutation VerifyStepUpVerification($code: String!) {
  verifyStepUpVerification(code: $code)
}

mutation RevokeAllOtherSessions($step_up_token: String!) {
  revokeAllOtherSessions(stepUpToken: $step_up_token)
}
