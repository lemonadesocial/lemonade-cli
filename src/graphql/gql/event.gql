query GetEventCheckins($input: GetEventCheckinsInput!, $skip: Int, $limit: Int) {
  getEventCheckins(input: $input, skip: $skip, limit: $limit) {
    _id
    created_at
    email
    ticket
    login_user {
      _id
      name
      email
    }
    non_login_user {
      name
      email
    }
  }
}

query GetTicketsByIds($ids: [MongoID!]) {
  getTickets(_id: $ids) {
    _id
    type_expanded {
      _id
      title
    }
  }
}
